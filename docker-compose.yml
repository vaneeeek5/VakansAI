version: '3.3'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vacancies
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vakansai_net
    restart: always

  app:
    build: .
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./sessions:/app/sessions
    networks:
      - vakansai_net
    restart: always

networks:
  vakansai_net:
    driver: bridge

volumes:
  postgres_data:
